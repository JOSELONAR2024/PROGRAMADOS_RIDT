<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editor de Excel Web</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.css">
    <style>
        body { font-family: sans-serif; margin: 20px; }
        #controls { margin-bottom: 20px; }
        #excel-table { width: 100%; height: 80vh; overflow: hidden; }
        .btn { padding: 10px 15px; cursor: pointer; background: #217346; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="controls">
        <input type="file" id="file-input" accept=".xlsx, .xls" />
        <button id="save-btn" class="btn" style="display:none;">Guardar Cambios</button>
    </div>

    <div id="excel-table"></div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
