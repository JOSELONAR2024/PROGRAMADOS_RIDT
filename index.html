<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor y Editor Oficial de Solicitudes</title>
    
    <!-- Cargamos SheetJS para procesar el archivo por dentro sin romperlo -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    
    <!-- Cargamos Canvas-Datagrid que dibuja el Excel de forma idéntica a como es por dentro -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-datagrid/dist/canvas-datagrid.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f3f4f6;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #top-bar {
            background-color: #217346; /* El color verde oficial de Excel */
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        #grid-container {
            flex-content: stretch;
            flex-grow: 1;
            background: white;
            overflow: hidden;
            position: relative;
        }
        .btn {
            background-color: white;
            color: #217346;
            border: none;
            padding: 8px 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #e1f5fe;
        }
        #file-input {
            color: white;
            font-size: 14px;
        }
        /* Instrucciones flotantes si no hay archivo */
        #drop-zone-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            text-align: center;
            font-size: 18px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="top-bar">
        <div class="controls">
            <strong>Visualizador Integrado:</strong>
            <input type="file" id="file-input" accept=".xlsx, .xls" />
        </div>
        <button class="btn" id="btn-save" style="display: none;">Guardar y Descargar Excel</button>
    </div>

    <div id="grid-container">
        <div id="drop-zone-text">Selecciona o arrastra el archivo de Solicitud de Empleo aquí para empezar</div>
    </div>

    <script>
        let grid;
        let originalWorkbook;
        let activeSheetName;

        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Ocultar texto de ayuda
            document.getElementById('drop-zone-text').style.display = 'none';

            const reader = new FileReader();
            reader.onload = function(evt) {
                const data = new Uint8Array(evt.target.result);
                
                // Leer el archivo conservando los estilos internos, celdas y estructuras
                originalWorkbook = XLSX.read(data, {type: 'array', cellStyles: true, cellNF: true});
                activeSheetName = originalWorkbook.SheetNames[0];
                
                // Convertir la estructura interna a un formato plano que entienda el visor web
                const worksheet = originalWorkbook.Sheets[activeSheetName];
                const jsonData = XLSX.utils.sheet_to_json(worksheet, {header: 1, defval: ""});

                // Inicializar o actualizar el visor gráfico
                renderGrid(jsonData);
                
                // Mostrar botón de guardado
                document.getElementById('btn-save').style.display = 'block';
            };
            reader.readAsArrayBuffer(file);
        });

        function renderGrid(data) {
            const container = document.getElementById('grid-container');
            
            // Si ya existía una vista previa la limpiamos
            container.innerHTML = '';

            // Crear el visor interactivo de celdas
            grid = canvasDatagrid({
                parentNode: container,
                data: data,
                allowGridEditing: true, // Permitir que hagas clic y edites directamente
                borderDragBehavior: 'move',
                allowColumnReordering: false,
                allowRowReordering: false
            });

            // Forzar a que ocupe todo el tamaño de la pantalla web
            grid.style.width = '100%';
            grid.style.height = '100%';
        }

        // Evento para guardar los cambios de vuelta al archivo original
        document.getElementById('btn-save').addEventListener('click', function() {
            if (!grid || !originalWorkbook) return;

            // 1. Obtener los datos modificados desde la pantalla web
            const editedData = grid.data;

            // 2. Convertir los datos de vuelta al formato de Hoja de Excel
            const newWorksheet = XLSX.utils.aoa_to_sheet(editedData);

            // 3. Reemplazar la hoja vieja con la nueva editada manteniendo la estructura intacta
            originalWorkbook.Sheets[activeSheetName] = newWorksheet;

            // 4. Generar la descarga del archivo modificado
            XLSX.writeFile(originalWorkbook, "HR-AT-FR-005_Solicitud_Modificada.xlsx");
        });
    </script>
</body>
</html>
