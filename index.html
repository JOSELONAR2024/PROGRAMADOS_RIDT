<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor y Editor de Solicitud de Empleo</title>
    
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet/dist/plugins/css/pluginsCss.css' />
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet/dist/plugins/plugins.css' />
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet/dist/css/luckysheet.css' />
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet/dist/assets/iconfont/iconfont.css' />
    
    <script src="https://cdn.jsdelivr.net/npm/luckysheet/dist/plugins/js/plugin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luckysheet/dist/luckysheet.umd.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/luckyexcel/dist/luckyexcel.umd.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f4f5f7; }
        #header-bar { padding: 10px 20px; background: #217346; color: white; display: flex; align-items: center; gap: 15px; }
        #lucky-container { margin: 0; width: 100%; height: calc(100vh - 60px); left: 0px; top: 0px; }
        .btn { background: #ffffff; color: #217346; border: none; padding: 8px 15px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .btn:hover { background: #e2e2e2; }
        #file-input { color: white; }
    </style>
</head>
<body>

    <div id="header-bar">
        <strong style="font-size: 1.1em;">Editor de Formulario:</strong>
        <input type="file" id="file-input" accept=".xlsx" />
        <button class="btn" id="export-btn">Descargar Excel Editado</button>
    </div>

    <div id="lucky-container"></div>

    <script>
        let currentFileName = "Solicitud_Empleo_Editada.xlsx";

        // Inicializar Luckysheet vacío al arrancar
        window.onload = function() {
            luckysheet.create({
                container: 'lucky-container',
                lang: 'es',
                showinfobar: false
            });
        };

        // Procesar la carga del archivo Excel real
        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            currentFileName = file.name;

            Luckyexcel.transformExcelToLucky(file, function(exportJson, luckysheetHtml) {
                if (exportJson.sheets == null || exportJson.sheets.length == 0) {
                    alert("No se pudo leer el archivo de Excel correctamente.");
                    return;
                }
                
                // Destruir e inicializar Luckysheet con el diseño original del archivo
                luckysheet.destroy();
                luckysheet.create({
                    container: 'lucky-container',
                    lang: 'es',
                    showinfobar: false,
                    allowUpdate: true,
                    data: exportJson.sheets,
                    title: exportJson.info.name
                });
            });
        });

        // Guardar y descargar el archivo con los cambios realizados
        document.getElementById('export-btn').addEventListener('click', function() {
            // Nota: Para exportar de vuelta a un archivo .xlsx nativo manteniendo el 100% de los estilos 
            // avanzados de Luckysheet de forma local, se suele usar la extensión de exportación.
            // Esta función genera el objeto de datos actual.
            const sheets = luckysheet.getluckysheetfile();
            
            // Para fines prácticos e inmediatos en el navegador de manera local sin servidores complejos:
            alert("¡Cambios listos en la interfaz! Para un entorno de producción que guarde el archivo .xlsx exactamente igual con imágenes pesadas en el disco, Luckysheet envía este JSON resultante al backend.");
            console.log(sheets); 
        });
    </script>
</body>
</html>
